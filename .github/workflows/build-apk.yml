name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK with Flet
        run: |
          # 首先检查你的主程序文件名称（可能是 main.py 或 plant-app.py 等）
          # 假设主程序是 main.py，如果不是请修改下面的文件名
          flet build apk main.py \
            --package-name com.mayinchao.plantapp2 \
            --include-packages PIL,requests,urllib3 \
            --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plant-app-apk
          # 根据实际构建路径调整
          path: build/apk/*.apk
