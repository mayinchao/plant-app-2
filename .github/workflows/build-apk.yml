name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pillow requests
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: List files
        run: |
          ls -la
          echo "Current directory contents:"
          pwd

      - name: Build APK
        run: |
          # 假设主程序是 app.py，如果不是请修改
          # 如果主程序不是 app.py，请告诉我实际的文件名
          if [ -f "app.py" ]; then
            flet build apk app.py
          elif [ -f "main.py" ]; then
            flet build apk main.py
          else
            echo "Could not find main Python file"
            ls *.py
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plant-app-apk
          path: build/**/*.apk
