name: Build Flet Android APK

on:
  # 当推送到 main 或 master 分支时触发
  push:
    branches:
      - main
      - master
  # 当创建 Pull Request 时触发
  pull_request:
    branches:
      - main
      - master
  # 支持手动触发（在 GitHub Actions 页面点击按钮）
  workflow_dispatch:
    inputs:
      build-type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.24.4'  # Flet 要求的 Flutter 版本
  FLET_CLI_VERSION: 'latest'

jobs:
  build-apk:
    name: 构建 Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. 检出代码
      - name: 检出源代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # 3. 安装项目依赖
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-cli
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          echo "已安装的包:"
          pip list

      # 4. 设置 Java 环境（Flet APK 构建需要）
      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # 5. 设置 Android SDK 环境变量
      - name: 设置 Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH

      # 6. 设置 Flutter SDK（关键步骤！）
      - name: 设置 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # 7. 验证 Flutter 安装
      - name: 验证 Flutter 环境
        run: |
          flutter --version
          flutter doctor -v

      # 8. 接受 Android 许可证（Flutter 构建需要）
      - name: 接受 Android SDK 许可证
        run: |
          yes | flutter doctor --android-licenses || true

      # 9. 构建 APK
      - name: 构建 APK
        run: |
          # 根据触发类型选择构建命令
          if [ "${{ github.event.inputs.build-type }}" = "debug" ] || [ "${{ github.ref }}" != "refs/heads/main" ] && [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "构建 Debug 版本..."
            flet build apk --verbose
          else
            echo "构建 Release 版本..."
            flet build apk --release --verbose
          fi

      # 10. 查找并上传 APK 产物
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: plant-app-apk
          path: |
            build/apk/**/*.apk
            **/build/**/outputs/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      # 11. 输出 APK 位置信息
      - name: 输出构建信息
        run: |
          echo "=== 构建完成 ==="
          echo "查找 APK 文件:"
          find . -name "*.apk" -type f 2>/dev/null || echo "未找到 APK 文件"
          echo ""
          echo "APK 文件列表:"
          find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "未找到"
