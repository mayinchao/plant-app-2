name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Check file structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo "Files in Frontend:"
          ls -la Frontend/ || echo "Frontend directory not found"
          echo "All Python files:"
          find . -name "*.py" -type f

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f "Frontend/requirements.txt" ]; then
            pip install -r Frontend/requirements.txt
          fi
          if [ -f "backend/requirements.txt" ]; then
            pip install -r backend/requirements.txt
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Copy main.py to root
        run: |
          # 检查文件是否存在
          if [ -f "Frontend/main.py" ]; then
            echo "Found Frontend/main.py, copying to root..."
            cp Frontend/main.py ./
            ls -la main.py
          elif [ -f "main.py" ]; then
            echo "main.py already in root"
          else
            echo "ERROR: Cannot find main.py"
            exit 1
          fi

      - name: Build APK
        run: |
          export FLET_YES=1
          # 确认文件存在
          if [ -f "main.py" ]; then
            echo "Building with main.py"
            flet build apk main.py
          else
            echo "main.py not found!"
            exit 1
          fi

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: plant-app-apk
          path: |
            build/apk/*.apk
            build/**/*.apk
