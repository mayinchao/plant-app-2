name: Build Flet Android APK

on:
  # 当你推送到 main 分支时自动触发构建
  push:
    branches: [ main ]
  # 允许你从 GitHub 网页手动触发构建
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. 拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境 (Flet 需要)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装项目依赖 (如果有 requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            # 如果没有 requirements.txt，则只安装 flet
            pip install flet
          fi

      # 4. 设置 Java 环境 (Android 构建需要)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. 核心步骤：使用 Flet 命令构建 APK
      - name: Build APK with Flet
        run: |
          # 这里的包名非常重要，一旦确定，后续版本不可更改，请谨慎选择
          flet build apk --include-packages "PIL,requests,urllib3" --android-package-name "com.mayinchao.plantapp2"
      
      # 6. 上传构建好的 APK 作为 Artifact (构建产物)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plant-app-apk
          # Flet 构建的 APK 默认存放在这个路径
          path: build/apk/plant-app-2.apk
